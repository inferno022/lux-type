name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleStableRelease

    - name: Build Release Bundle
      run: ./gradlew bundleStableRelease

    - name: Find APK files
      id: find_apk
      run: echo "apk_path=$(find java/build/outputs/apk/stable/release -name '*.apk' | head -1)" >> $GITHUB_OUTPUT

    - name: Find Bundle files
      id: find_bundle
      run: echo "bundle_path=$(find java/build/outputs/bundle/stableRelease -name '*.aab' | head -1)" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Lux Type Keyboard ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          ${{ steps.find_apk.outputs.apk_path }}
          ${{ steps.find_bundle.outputs.bundle_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}