name: Robust Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Clean previous builds
      run: ./gradlew clean

    - name: Update Locales (with error handling)
      run: |
        echo "Updating locales..."
        ./gradlew updateLocales || echo "Locale update failed, continuing..."

    - name: Build Debug APK
      run: |
        echo "Building debug APK..."
        ./gradlew assembleUnstableDebug --info --stacktrace --no-daemon

    - name: Build Release APK
      run: |
        echo "Building release APK..."
        ./gradlew assembleStableRelease --info --stacktrace --no-daemon

    - name: Build Release Bundle
      run: |
        echo "Building release bundle..."
        ./gradlew bundleStableRelease --info --stacktrace --no-daemon

    - name: Find and Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-artifacts
        path: |
          build/outputs/apk/unstable/debug/
          build/outputs/apk/stable/release/
          build/outputs/bundle/stableRelease/
          build/reports/
        retention-days: 7
        if-no-files-found: warn

    - name: Build Summary
      if: always()
      run: |
        echo "## Build Summary"
        echo "- Gradle Version: $(./gradlew --version)"
        echo "- Java Version: $(java -version 2>&1 | head -1)"
        echo "- Build Status: ${{ job.status }}"
