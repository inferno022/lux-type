name: Fixed Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Update Locales
      run: ./gradlew updateLocales || true

    - name: Build Debug APK with detailed output
      run: ./gradlew assembleUnstableDebug --info --stacktrace --warning-mode all

    - name: Build Release APK with detailed output
      run: ./gradlew assembleStableRelease --info --stacktrace --warning-mode all

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          java/build/outputs/apk/unstable/debug/
          java/build/outputs/apk/stable/release/
        retention-days: 7

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          build/reports/
          java/build/reports/
        retention-days: 7
